{% extends "base.html" %}
{% block content %}

<h1>{{ sensor.name }} Verlauf</h1>

<canvas id="chart" width="800" height="400"></canvas>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: {{ labels|tojson }},
        datasets: [{
            label: '{{ sensor.unit }}',
            data: {{ values|tojson }},
            borderWidth: 2,
            fill: false,
            tension: 0.1
        }]
    },
    options: {
        responsive: true
    }
});
</script>

{% endblock %}

{% extends "base.html" %}
{% block content %}
<section class="page-header">
  <h2>Sensor Konfiguration</h2>
  <p>Jeder Sensor hat seine eigene Konfigurationskarte.</p>
</section>

<div class="config-grid">
{% for sensor in sensors %}
  <section class="card">
    <div class="card-title-row">
      <h3>Sensor {{ sensor.id }}</h3>
      <span class="badge {{ 'ok' if sensor.enabled else 'unknown' }}">{{ 'aktiv' if sensor.enabled else 'deaktiviert' }}</span>
    </div>
    <form method="post" class="form-grid two-cols">
      <input type="hidden" name="sensor_id" value="{{ sensor.id }}">
      <label>Name<input name="name" value="{{ sensor.name }}"></label>
      <label>Kanal<input name="channel" type="number" value="{{ sensor.channel }}"></label>
      <label>Einheit<input name="unit" value="{{ sensor.unit }}"></label>
      <label>Abtastintervall ms<input name="sample_interval_ms" type="number" value="{{ sensor.sample_interval_ms }}"></label>
      <label>Min raw<input name="min_raw" type="number" step="any" value="{{ sensor.min_raw }}"></label>
      <label>Max raw<input name="max_raw" type="number" step="any" value="{{ sensor.max_raw }}"></label>
      <label>Min skaliert<input name="min_scaled" type="number" step="any" value="{{ sensor.min_scaled }}"></label>
      <label>Max skaliert<input name="max_scaled" type="number" step="any" value="{{ sensor.max_scaled }}"></label>
      <label>Alarm low<input name="alarm_low" type="number" step="any" value="{{ sensor.alarm_low if sensor.alarm_low is not none else '' }}"></label>
      <label>Alarm high<input name="alarm_high" type="number" step="any" value="{{ sensor.alarm_high if sensor.alarm_high is not none else '' }}"></label>
      <label class="checkbox full-row"><input name="enabled" type="checkbox" {% if sensor.enabled %}checked{% endif %}> Sensor aktiv</label>
      <div class="actions full-row">
        <button type="submit">Sensor {{ sensor.id }} speichern</button>
      </div>
    </form>
  </section>
{% endfor %}
</div>
{% endblock %}
